<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strands Puzzle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Strands</h1>
            <div class="score-board">
                <div class="score">
                    <span class="label">Score</span>
                    <span id="score-display" class="value">0</span>
                </div>
                <div class="hint-button" id="hint-btn">
                    <span class="icon">💡</span>
                    <span class="label">Hint</span>
                    <span id="hint-count" class="count">0</span>
                </div>
            </div>
        </header>

        <main>
            <div class="game-area">
                <div class="board" id="board">
                    <!-- Cells will be generated by JavaScript -->
                </div>
                
                <div class="word-display">
                    <div id="current-word" class="word">Select cells to form words</div>
                </div>
            </div>

            <div class="sidebar">
                <div class="theme-section">
                    <h2>Theme</h2>
                    <div id="theme-display" class="theme-name">Loading...</div>
                </div>

                <div class="found-words-section">
                    <h2>Found Words</h2>
                    <div id="found-words-list" class="words-list">
                        <!-- Found words will be displayed here -->
                    </div>
                </div>

                <div class="status-section">
                    <div class="status-item">
                        <span class="label">Theme Words:</span>
                        <span id="theme-count" class="value">0/5</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Completion:</span>
                        <span id="completion" class="value">0%</span>
                    </div>
                </div>

                <button id="reset-btn" class="reset-button">New Game</button>
            </div>
        </main>

        <div id="message-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-title">Message</h3>
                <p id="modal-message">Message content</p>
                <button id="modal-close" class="close-button">OK</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
